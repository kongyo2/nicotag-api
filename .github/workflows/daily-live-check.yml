name: Daily live check

on:
  schedule:
    # UTC 21:00 = JST 06:00 — ニコニコサーバの負荷が低い時間帯で daily 実行
    - cron: '0 21 * * *'
  workflow_dispatch:

permissions:
  contents: read
  issues: write

concurrency:
  group: daily-live-check
  cancel-in-progress: false

jobs:
  live:
    name: live tag sanity check
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Live test (attempt 1)
        id: attempt1
        continue-on-error: true
        env:
          NICOTAG_LIVE: '1'
        run: npx vitest run tests/live.test.ts --reporter=verbose

      - name: Wait before retry
        if: steps.attempt1.outcome == 'failure'
        run: sleep 60

      - name: Live test (attempt 2)
        id: attempt2
        if: steps.attempt1.outcome == 'failure'
        env:
          NICOTAG_LIVE: '1'
        run: npx vitest run tests/live.test.ts --reporter=verbose

      - name: Mark success
        if: steps.attempt1.outcome == 'success' || steps.attempt2.outcome == 'success'
        run: echo "live check passed"

  notify-failure:
    name: notify failure via issue
    needs: live
    if: failure()
    runs-on: ubuntu-latest
    permissions:
      contents: read
      issues: write
    steps:
      - name: Open or comment on tracking issue
        uses: actions/github-script@v7
        with:
          script: |
            const title = '[daily-live-check] live tag test failing';
            const runUrl = `${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`;
            const today = new Date().toISOString().slice(0, 10);
            const body = [
              `Daily live tag sanity check failed on **${today}** (UTC).`,
              `Trigger: \`${context.eventName}\``,
              ``,
              `これは大抵 nicovideo.jp 側で以下のような破壊的変更があったことを示しています:`,
              `- \`meta[name="server-response"]\` タグの rename / 削除`,
              `- \`data.response.tag.items\` JSON パスの変更`,
              `- \`data.response.video\` セクションのスキーマ変更`,
              `- watch ページの HTML 構造変更 (data-api-data 属性など)`,
              `- HTML レスポンス自体が認証必須 / キャプチャ / 完全遮断`,
              ``,
              `失敗した run: ${runUrl}`,
              ``,
              `ローカル再現:`,
              '```',
              `NICOTAG_LIVE=1 npx vitest run tests/live.test.ts --reporter=verbose`,
              '```',
            ].join('\n');

            const existing = await github.rest.issues.listForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              state: 'open',
              labels: 'daily-live-check',
              per_page: 10,
            });
            const tracking = existing.data.find((i) => i.title === title);

            if (tracking) {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: tracking.number,
                body,
              });
              core.info(`commented on existing issue #${tracking.number}`);
            } else {
              const created = await github.rest.issues.create({
                owner: context.repo.owner,
                repo: context.repo.repo,
                title,
                body,
                labels: ['daily-live-check', 'bug'],
              });
              core.info(`opened issue #${created.data.number}`);
            }

  notify-recovery:
    name: close tracking issue on recovery
    needs: live
    if: success()
    runs-on: ubuntu-latest
    permissions:
      contents: read
      issues: write
    steps:
      - name: Auto-close any open tracking issue
        uses: actions/github-script@v7
        with:
          script: |
            const title = '[daily-live-check] live tag test failing';
            const existing = await github.rest.issues.listForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              state: 'open',
              labels: 'daily-live-check',
              per_page: 10,
            });
            const tracking = existing.data.find((i) => i.title === title);
            if (!tracking) {
              core.info('no open tracking issue — nothing to close');
              return;
            }
            const runUrl = `${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`;
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: tracking.number,
              body: `Live tag sanity check passed again. Closing.\nRun: ${runUrl}`,
            });
            await github.rest.issues.update({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: tracking.number,
              state: 'closed',
              state_reason: 'completed',
            });
            core.info(`closed issue #${tracking.number}`);
